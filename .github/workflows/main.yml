name: Compilar iOS desde YYZ
on:
  workflow_dispatch: # Activación manual por botón

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Stitch (GameMaker CLI tool)
      run: npm install -g @bscotch/stitch

    - name: Run GameMaker Compiler for iOS
      run: |
        # Cambia "mi_juego.yyz" por el nombre exacto de tu archivo si le pusiste otro
        stitch build --platform ios --project ./mi_juego.yyz

    - name: Upload Xcode Project Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Proyecto-Xcode-iOS
        path: ./build/ios/
