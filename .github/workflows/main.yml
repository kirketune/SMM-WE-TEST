name: Compilar iOS (.ipa)
on:
  workflow_dispatch: # Esto te permite activar la compilación manualmente con un botón

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 18

    - name: Install Stitch (GameMaker CLI tool)
      run: npm install -g @bscotch/stitch

    - name: Run GameMaker Compiler for iOS
      run: |
        # Este comando le dice al Mac de GitHub que compile el proyecto para iOS
        # Nota: Generará el proyecto Xcode listo para compilar
        stitch build --platform ios --project .

    - name: Upload Xcode Project Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Proyecto-Xcode-iOS
        path: ./build/ios/
